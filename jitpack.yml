language: android
android:
  components:
    - build-tools-30.0.3
    - android-34
    - extra-google-google_play_services
    - extra-google-m2repository
    - extra-android-m2repository
  licenses:
    - android-sdk-license-.+
    - google-gdk-license-.+

before_install:
  - chmod +x gradlew

# 关键：关闭阿里云仓库，用官方仓库
install:
  - true

script:
  - ./gradlew clean assembleRelease -PmavenMirror=google